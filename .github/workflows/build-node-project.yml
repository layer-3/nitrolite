name: Build Node.js Project

on:
  workflow_call:
    inputs:
      project-path:
        description: 'Path to the Node.js project directory'
        required: true
        type: string
      project-name:
        description: 'Human-readable name for the project'
        required: true
        type: string
      bootstrap-project-path:
        description: 'Optional sibling project that must be built before the target (e.g. for `file:` dependencies)'
        required: false
        type: string
        default: ''
      bootstrap-build-script:
        description: 'npm script to run in the bootstrap project'
        required: false
        type: string
        default: 'build:ci'

jobs:
  build:
    name: Build ${{ inputs.project-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '${{ inputs.project-path }}/package.json'
          cache: 'npm'
          cache-dependency-path: |
            ${{ inputs.project-path }}/package-lock.json
            ${{ inputs.bootstrap-project-path != '' && format('{0}/package-lock.json', inputs.bootstrap-project-path) || '' }}

      - name: Install bootstrap dependencies
        if: ${{ inputs.bootstrap-project-path != '' }}
        run: npm ci
        working-directory: ${{ inputs.bootstrap-project-path }}

      - name: Build bootstrap project
        if: ${{ inputs.bootstrap-project-path != '' }}
        run: npm run ${{ inputs.bootstrap-build-script }}
        working-directory: ${{ inputs.bootstrap-project-path }}

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ inputs.project-path }}

      - name: Build
        run: npm run build
        working-directory: ${{ inputs.project-path }}
