name: PR on main branch

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-clearnode:
    name: Test (Clearnode)
    uses: ./.github/workflows/test-go.yml

  test-forge:
    name: Test (Foundry)
    uses: ./.github/workflows/test-forge.yml

  test-sdk-ts:
    name: Test (TS SDK)
    uses: ./.github/workflows/test-sdk.yml
    with:
      project-path: 'sdk/ts'
      project-name: 'TS SDK'

  test-sdk-compat:
    name: Test (TS SDK Compat)
    uses: ./.github/workflows/test-sdk.yml
    with:
      project-path: 'sdk/ts-compat'
      project-name: 'TS SDK Compat'
      bootstrap-project-path: 'sdk/ts'

  test-protocol-drift-static:
    name: Test (Protocol Drift Static)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: sdk/ts/package.json
          cache: npm
          cache-dependency-path: |
            sdk/ts/package-lock.json
            sdk/ts-compat/package-lock.json

      - name: Install TS SDK dependencies
        run: npm ci
        working-directory: sdk/ts

      - name: Build TS SDK for compat file dependency
        run: npm run build:ci
        working-directory: sdk/ts

      - name: Install TS SDK Compat dependencies
        run: npm ci
        working-directory: sdk/ts-compat

      - name: Run static protocol drift checks
        run: ./scripts/check-protocol-drift.sh --static

  test-protocol-drift-runtime:
    name: Test (Protocol Drift Runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: sdk/ts/package.json
          cache: npm
          cache-dependency-path: |
            sdk/ts/package-lock.json
            sdk/ts-compat/package-lock.json

      - name: Install TS SDK dependencies
        run: npm ci
        working-directory: sdk/ts

      - name: Build TS SDK for compat file dependency
        run: npm run build:ci
        working-directory: sdk/ts

      - name: Install TS SDK Compat dependencies
        run: npm ci
        working-directory: sdk/ts-compat

      - name: Run runtime protocol drift smoke
        run: ./scripts/check-protocol-drift.sh --runtime
        env:
          CLEARNODE_RUNTIME_SMOKE_LOG_DIR: runtime-smoke-logs

      - name: Upload runtime smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-drift-runtime-smoke-logs
          path: runtime-smoke-logs
          if-no-files-found: ignore

  build-and-publish-clearnode:
    name: Build and Publish (Clearnode)
    needs: test-clearnode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./clearnode/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/clearnode:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          build-args: |
            VERSION=${{ steps.sha.outputs.short_sha }}
