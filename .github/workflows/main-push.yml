name: Push on main branch

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-clearnode:
    name: Test (Clearnode)
    uses: ./.github/workflows/test-go.yml

  test-forge:
    name: Test (Foundry)
    uses: ./.github/workflows/test-forge.yml

  test-sdk-ts:
    name: Test (TS SDK)
    uses: ./.github/workflows/test-sdk.yml
    with:
      project-path: 'sdk/ts'
      project-name: 'TS SDK'

  test-sdk-compat:
    name: Test (TS SDK Compat)
    uses: ./.github/workflows/test-sdk.yml
    with:
      project-path: 'sdk/ts-compat'
      project-name: 'TS SDK Compat'
      bootstrap-project-path: 'sdk/ts'

  # build-and-publish-sdk:
  #   needs: [test-sdk-ts, test-sdk-compat]
  #   name: Build and Publish (SDK)
  #   uses: ./.github/workflows/publish-sdk.yml
  #   secrets:
  #     npm-token: ${{ secrets.NPM_TOKEN }}

  build-and-publish-clearnode:
    name: Build and Publish (Clearnode)
    needs: test-clearnode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tagger.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./clearnode/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/clearnode:${{ steps.sha.outputs.short_sha }}
            ghcr.io/${{ github.repository }}/clearnode:latest-main
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
