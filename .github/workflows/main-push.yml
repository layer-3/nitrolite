name: Push on main branch

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-nitronode:
    name: Test (Nitronode)
    uses: ./.github/workflows/test-go.yml

  test-forge:
    name: Test (Foundry)
    uses: ./.github/workflows/test-forge.yml

  test-sdk-ts:
    name: Test (TS SDK)
    uses: ./.github/workflows/test-sdk.yml
    with:
      project-path: 'sdk/ts'
      project-name: 'TS SDK'
      forge-build: true

  test-sdk-compat:
    name: Test (TS SDK Compat)
    uses: ./.github/workflows/test-sdk.yml
    with:
      project-path: 'sdk/ts-compat'
      project-name: 'TS SDK Compat'
      bootstrap-project-path: 'sdk/ts'

  test-playground:
    name: Test (Playground)
    uses: ./.github/workflows/build-node-project.yml
    with:
      project-path: 'playground'
      project-name: 'Playground'
      bootstrap-project-path: 'sdk/ts'

  test-protocol-drift-static:
    name: Test (Protocol Drift Static)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.5.1

      - name: Build contract artifacts
        run: forge build
        working-directory: contracts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: sdk/ts/package.json
          cache: npm
          cache-dependency-path: |
            sdk/ts/package-lock.json
            sdk/ts-compat/package-lock.json

      - name: Install TS SDK dependencies
        run: npm ci
        working-directory: sdk/ts

      - name: Build TS SDK for compat file dependency
        run: npm run build:ci
        working-directory: sdk/ts

      - name: Install TS SDK Compat dependencies
        run: npm ci
        working-directory: sdk/ts-compat

      - name: Run static protocol drift checks
        run: ./scripts/check-protocol-drift.sh --static

  test-protocol-drift-runtime:
    name: Test (Protocol Drift Runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: sdk/ts/package.json
          cache: npm
          cache-dependency-path: |
            sdk/ts/package-lock.json
            sdk/ts-compat/package-lock.json

      - name: Install TS SDK dependencies
        run: npm ci
        working-directory: sdk/ts

      - name: Build TS SDK for compat file dependency
        run: npm run build:ci
        working-directory: sdk/ts

      - name: Install TS SDK Compat dependencies
        run: npm ci
        working-directory: sdk/ts-compat

      - name: Run runtime protocol drift smoke
        run: ./scripts/check-protocol-drift.sh --runtime
        env:
          NITRONODE_RUNTIME_SMOKE_LOG_DIR: runtime-smoke-logs

      - name: Upload runtime smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-drift-runtime-smoke-logs
          path: runtime-smoke-logs
          if-no-files-found: ignore

  # build-and-publish-sdk:
  #   needs: [test-sdk-ts, test-sdk-compat]
  #   name: Build and Publish (SDK)
  #   uses: ./.github/workflows/publish-sdk.yml
  #   secrets:
  #     npm-token: ${{ secrets.NPM_TOKEN }}

  build-and-publish-nitronode:
    name: Build and Publish (Nitronode)
    needs: test-nitronode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tagger.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./nitronode/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nitronode:${{ steps.sha.outputs.short_sha }}
            ghcr.io/${{ github.repository }}/nitronode:latest-main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-publish-faucet:
    name: Build and Publish (Faucet)
    needs: test-nitronode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tagger.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Save image tag
        id: tagger
        run: echo "image_tag=${{ steps.sha.outputs.short_sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./faucet-app/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/faucet-app:${{ steps.sha.outputs.short_sha }}
            ghcr.io/${{ github.repository }}/faucet-app:latest-main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-publish-playground:
    name: Build and Publish (Playground)
    needs: test-playground
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tagger.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Save image tag
        id: tagger
        run: echo "image_tag=${{ steps.sha.outputs.short_sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./playground/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/playground:${{ steps.sha.outputs.short_sha }}
            ghcr.io/${{ github.repository }}/playground:latest-main
          cache-from: type=gha
          cache-to: type=gha,mode=max

