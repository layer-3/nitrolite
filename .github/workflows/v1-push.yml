  auto-tag:
    name: Auto-Tag
    needs: test-clearnode
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image-tag: ${{ steps.tagger.outputs.new_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run auto tag script
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

          ./clearnode/scripts/auto_tag.sh v1.0.0

      - name: Store the new tag
        id: tagger
        run: |
          NEW_TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*-rc.[0-9]*" --abbrev=0)
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  build-and-publish-clearnode:
    name: Build and Publish (Clearnode)
    needs: auto-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.tagger.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Save image tag
        id: tagger
        run: |
          echo "image_tag=${{ needs.auto-tag.outputs.image-tag }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./clearnode/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/clearnode:${{ needs.auto-tag.outputs.image-tag }}
            ghcr.io/${{ github.repository }}/clearnode:latest-rc
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.auto-tag.outputs.image-tag }}


