$schema: "http://json-schema.org"
type: object
required:
  - level_step_tokens
  - app_cost
  - action_gates
properties:
  level_step_tokens:
    type: string
    pattern: "^(?:[1-9][0-9]*(\\.[0-9]+)?|0\\.[0-9]*[1-9][0-9]*)$"
    description: "Decimal amount for level step tokens"
  app_cost:
    type: string
    pattern: "^(?:[1-9][0-9]*(\\.[0-9]+)?|0\\.[0-9]*[1-9][0-9]*)$"
  action_gates:
    type: object
    additionalProperties:
      $ref: "#/definitions/ActionGateConfig"
definitions:
  ActionGateConfig:
    type: object
    required:
      - free_actions_allowance
      - increase_per_level
    properties:
      free_actions_allowance:
        type: integer
        minimum: 0
      increase_per_level:
        type: integer
        minimum: 0
