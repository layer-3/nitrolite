# -- Override the full name
fullnameOverride: ""

config:
  # -- List of arguments to pass to the container. Binary is on PATH at
  # /bin/faucet-server (see Dockerfile CMD); the chart only needs to override
  # this when running with extra flags.
  args: ["faucet-server"]
  # -- Log level (info, debug, warn, error)
  logLevel: info
  # -- Nitronode WebSocket URL
  nitronodeWsUrl: "ws://nitronode.example.svc.cluster.local:7824/ws"
  token:
    # -- Token symbol inside the Nitronode network
    symbol: usdc
    # -- The amount of tokens to tip per request
    tipAmount: 10
  # -- Minimum number of transfers the server should have a balance for to operate
  minTransferCount: 5
  # -- Cooldown between requests per wallet/IP (Go duration, e.g. 24h, 1h30m)
  cooldownPeriod: 24h
  # -- Comma-separated trusted proxy IPs/CIDRs; empty means direct exposure only
  trustedProxies: ""
  # -- Additional environment variables as key-value pairs
  extraEnvs: {}
    # KEY: VALUE
  # -- Additional environment variables to be stored in a secret
  secretEnvs: {}
    # KEY: VALUE
  # -- Name of the secret containing environment variables
  envSecret: ""

# -- Number of replicas
replicaCount: 1

image:
  # -- Docker image repository
  repository: ghcr.io/layer-3/nitrolite/faucet-app
  # -- Docker image tag (set via helmfile/CI)
  tag: ""

service:
  http:
    # -- Enable HTTP service
    enabled: true
    # -- HTTP service port
    port: 8000
    # -- HTTP service path
    path: /

metrics:
  # -- Enable Prometheus metrics
  enabled: true
  podmonitoring:
    # -- Enable PodMonitoring for Managed Prometheus
    enabled: false
  # -- Metrics port
  port: 4242
  # -- Metrics endpoint path
  endpoint: "/metrics"
  # -- Metrics scrape interval
  scrapeInterval: 30s

probes:
  liveness:
    # -- Enable liveness probe
    enabled: false
    # -- Liveness probe type (http, tcp)
    type: tcp
  readiness:
    # -- Enable readiness probe
    enabled: false
    # -- Readiness probe type (http, tcp)
    type: tcp

resources:
  # -- Resource limits
  limits: {}
    # cpu: 100m
    # memory: 256Mi
    # ephemeral-storage: 100Mi
  # -- Resource requests
  requests: {}
    # cpu: 100m
    # memory: 256Mi
    # ephemeral-storage: 100Mi

# -- Service account name
serviceAccount: ""

autoscaling:
  # -- Enable autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 2
  # -- Maximum number of replicas
  maxReplicas: 100
  # -- Target CPU utilization
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization
  targetMemoryUtilizationPercentage: 80

networking:
  # -- TLS cluster issuer
  tlsClusterIssuer: zerossl-prod
  # -- External hostname for the gateway
  externalHostname: faucet.example.com

  gateway:
    # -- Enable API gateway
    enabled: true
    # -- Gateway class name
    className: envoy-gateway
    # -- GKE static IP address name (GKE only)
    ipAddressName: ""

  ingress:
    # -- Enable ingress
    enabled: false
    # -- Ingress class name
    className: nginx
    # -- Ingress annotations
    annotations: {}
    # -- Enable GRPC for ingress
    grpc: false
    tls:
      # -- Enable TLS for ingress
      enabled: false

# -- Image pull secret name. Default refers to the Secret created by the
# co-deployed nitronode release in the same namespace (faucet `needs:`
# nitronode in helmfile, so it always exists by the time faucet pulls).
imagePullSecret: nitronode-ghcr-pull

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity settings
affinity: {}

# -- Additional labels to add to all resources
extraLabels: {}
