{{- $http := .Values.service.http }}
{{- if and .Values.networking.gateway.enabled $http.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "playground.common.fullname" . }}
  labels:
    {{- include "playground.common.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: {{ .Release.Namespace }}
      name: {{ include "playground.common.fullname" . }}
      port: 443
      sectionName: https
  hostnames:
    - {{ .Values.networking.externalHostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $http.path }}
      backendRefs:
        - name: {{ include "playground.common.fullname" . }}
          # Mirror service.yaml's `ports[].port = default .port .externalPort`
          # so the route targets a port the Service actually exposes when
          # externalPort/internalPort diverge.
          port: {{ default $http.port $http.externalPort }}
{{- end }}
