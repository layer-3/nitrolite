server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # SPA mount point. The bundle is emitted with Vite base=/playground/, so
    # all asset URLs already include the prefix. try_files falls back to the
    # SPA entry for client-side routes / hard refreshes.
    location /playground/ {
        try_files $uri $uri/ /playground/index.html;
    }

    # Static cache headers for hashed assets.
    location /playground/assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
