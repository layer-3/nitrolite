server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;

    # The container sits behind an HTTPS ingress that terminates TLS and
    # proxies to port 8080. Without these directives, nginx's auto-generated
    # 301 (e.g. "/v1/playground" → "/v1/playground/") would include the
    # backend port and HTTP scheme, sending clients to
    # `http://<host>:8080/...`.
    absolute_redirect off;
    port_in_redirect off;

    # Browsers that hit the prefix without a trailing slash get bumped onto
    # the slash form so try_files can resolve the SPA entry.
    location = /v1/playground {
        return 301 /v1/playground/;
    }

    # SPA mount point. The bundle is emitted with Vite base=/v1/playground/,
    # so all asset URLs already include the prefix. try_files falls back to
    # the SPA entry for client-side routes and hard refreshes.
    location /v1/playground/ {
        try_files $uri $uri/ /v1/playground/index.html;
    }

    # Static cache headers for hashed assets.
    location /v1/playground/assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
